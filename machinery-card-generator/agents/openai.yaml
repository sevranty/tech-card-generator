interface:
  display_name: "Карточки о технике"
  short_description: "Полный анализ одной реальной машины, наглядная рабочая сцена и проверенная карточка 2×1"
  default_prompt: "Используй machinery-card-generator полностью: выбери одну главную реальную машину, покажи весь анализ и четыре точных русских текста до генерации, затем создай, проверь и прикрепи только последнюю успешную карточку 2×1."
policy:
  allow_implicit_invocation: true
